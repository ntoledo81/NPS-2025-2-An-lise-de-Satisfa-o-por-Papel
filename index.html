<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NPS 2025-2 — Scores Críticos e Baixos</title>
<link href="https://fonts.googleapis.com/css2?family=Ubuntu:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --white: #FFFFFF;
  --dark-blue: #4219B5;
  --red: #FF2726;
  --yellow: #FFC20E;
  --green: #00AA9E;
  --light-blue: #4CD1F6;
  --light-gray: #F2F2F2;
  --black: #242426;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Ubuntu', sans-serif;
  background: var(--white);
  color: var(--black);
  line-height: 1.5;
}

header {
  background: var(--dark-blue);
  color: var(--white);
  padding: 28px 40px;
  display: flex;
  align-items: baseline;
  gap: 16px;
}
header h1 { font-weight: 700; font-size: 22px; }
header span { font-weight: 300; font-size: 14px; opacity: .75; }

/* Summary cards */
.summary {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
  gap: 16px;
  padding: 28px 40px;
}
.card {
  background: var(--light-gray);
  border-radius: 10px;
  padding: 20px 22px;
  transition: transform .2s ease, box-shadow .2s ease;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: 0 6px 18px rgba(66,25,181,.12);
}
.card .label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .4px; color: var(--dark-blue); }
.card .value { font-size: 32px; font-weight: 700; margin-top: 4px; }
.card.critico .value { color: var(--red); }
.card.baixo .value { color: var(--yellow); }
.card.total .value { color: var(--dark-blue); }

/* Filters */
.filters {
  padding: 0 40px 20px;
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  align-items: center;
}
.filters label { font-size: 12px; font-weight: 500; text-transform: uppercase; letter-spacing: .3px; color: var(--dark-blue); }
.filter-group { display: flex; flex-direction: column; gap: 4px; }
.filters select, .filters input[type="text"] {
  font-family: 'Ubuntu', sans-serif;
  font-size: 14px;
  padding: 8px 12px;
  border: 1.5px solid #d0d0d0;
  border-radius: 6px;
  background: var(--white);
  color: var(--black);
  outline: none;
  transition: border-color .2s ease;
  min-width: 180px;
}
.filters select:focus, .filters input[type="text"]:focus {
  border-color: var(--dark-blue);
}
.btn-clear {
  font-family: 'Ubuntu', sans-serif;
  font-size: 13px;
  font-weight: 500;
  padding: 8px 18px;
  border: none;
  border-radius: 6px;
  background: var(--light-gray);
  color: var(--dark-blue);
  cursor: pointer;
  align-self: flex-end;
  transition: background .2s ease;
}
.btn-clear:hover { background: #e2e2e2; }

/* Table */
.table-wrap {
  padding: 0 40px 40px;
  overflow-x: auto;
}
table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0;
  font-size: 14px;
}
thead th {
  background: var(--dark-blue);
  color: var(--white);
  font-weight: 500;
  text-align: left;
  padding: 12px 16px;
  position: sticky;
  top: 0;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  transition: background .2s ease;
}
thead th:hover { background: #3514a0; }
thead th:first-child { border-radius: 8px 0 0 0; }
thead th:last-child { border-radius: 0 8px 0 0; }
thead th .sort-arrow { margin-left: 4px; font-size: 10px; opacity: .5; }
thead th.sorted-asc .sort-arrow, thead th.sorted-desc .sort-arrow { opacity: 1; }

tbody tr {
  transition: background .15s ease;
}
tbody tr:nth-child(even) { background: var(--light-gray); }
tbody tr:hover { background: rgba(76,209,246,.12); }
tbody td { padding: 10px 16px; border-bottom: 1px solid #e8e8e8; }

/* Cluster badges */
.badge {
  display: inline-block;
  padding: 3px 10px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  white-space: nowrap;
}
.badge.critico { background: rgba(255,39,38,.12); color: var(--red); }
.badge.baixo { background: rgba(255,194,14,.15); color: #b88a00; }

/* Score pill */
.score-pill {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 38px;
  height: 26px;
  border-radius: 4px;
  font-weight: 700;
  font-size: 13px;
}
.score-pill.s1 { background: var(--red); color: var(--white); }
.score-pill.s2 { background: rgba(255,39,38,.55); color: var(--white); }
.score-pill.s3 { background: var(--yellow); color: var(--black); }

/* Row count */
.row-count {
  padding: 0 40px 12px;
  font-size: 13px;
  color: #888;
  font-weight: 400;
}
.row-count span { font-weight: 700; color: var(--dark-blue); }

/* Fade-in animation for rows */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}
tbody tr.visible { animation: fadeIn .25s ease forwards; }

/* Responsive */
@media (max-width: 700px) {
  header { padding: 20px; }
  .summary { padding: 20px; }
  .filters { padding: 0 20px 16px; }
  .table-wrap { padding: 0 20px 20px; }
  .row-count { padding: 0 20px 10px; }
}
</style>
</head>

// Unique values for filters
const unique = (arr, key) => [...new Set(arr.map(d => d[key]))].sort();
const selRole = document.getElementById('fRole');
const selQuestion = document.getElementById('fQuestion');
const selCluster = document.getElementById('fCluster');
const selCS = document.getElementById('fCS');
const inputSearch = document.getElementById('fSearch');
const tbody = document.getElementById('tbody');

unique(DATA, 'role').forEach(v => selRole.add(new Option(v, v)));
unique(DATA, 'question').forEach(v => selQuestion.add(new Option(v, v)));
unique(DATA, 'cluster').forEach(v => selCluster.add(new Option(v, v)));
unique(DATA, 'cs').forEach(v => selCS.add(new Option(v, v)));

let sortCol = 'score';
let sortAsc = true;

function clusterClass(c) { return c.startsWith('Crítico') ? 'critico' : 'baixo'; }
function scoreClass(s) { return s <= 1 ? 's1' : s <= 2 ? 's2' : 's3'; }

function filtered() {
  const r = selRole.value, q = selQuestion.value, cl = selCluster.value, cs = selCS.value;
  const s = inputSearch.value.toLowerCase();
  return DATA.filter(d =>
    (!r || d.role === r) &&
    (!q || d.question === q) &&
    (!cl || d.cluster === cl) &&
    (!cs || d.cs === cs) &&
    (!s || d.escola.toLowerCase().includes(s))
  );
}

function render() {
  const rows = filtered();
  rows.sort((a, b) => {
    let va = a[sortCol], vb = b[sortCol];
    if (typeof va === 'string') { va = va.toLowerCase(); vb = vb.toLowerCase(); }
    if (va < vb) return sortAsc ? -1 : 1;
    if (va > vb) return sortAsc ? 1 : -1;
    return 0;
  });

  tbody.innerHTML = rows.map((d, i) => `
    <tr class="visible" style="animation-delay:${Math.min(i * 15, 400)}ms">
      <td>${d.role}</td>
      <td>${d.question}</td>
      <td><span class="badge ${clusterClass(d.cluster)}">${d.cluster}</span></td>
      <td><span class="score-pill ${scoreClass(d.score)}">${d.score.toFixed(1)}</span></td>
      <td>${d.escola}</td>
      <td>${d.cs}</td>
    </tr>
  `).join('');

  // Summary cards
  const critico = rows.filter(d => d.cluster.startsWith('Crítico')).length;
  const baixo = rows.filter(d => d.cluster.startsWith('Baixo')).length;
  const schools = new Set(rows.map(d => d.escola)).size;
  const csCount = new Set(rows.map(d => d.cs)).size;

  document.getElementById('summary').innerHTML = `
    <div class="card critico"><div class="label">Crítico (1-2)</div><div class="value">${critico}</div></div>
    <div class="card baixo"><div class="label">Baixo (2.01-3)</div><div class="value">${baixo}</div></div>
    <div class="card total"><div class="label">Total registros</div><div class="value">${rows.length}</div></div>
    <div class="card total"><div class="label">Escolas</div><div class="value">${schools}</div></div>
    <div class="card total"><div class="label">CS reps</div><div class="value">${csCount}</div></div>
  `;

  document.getElementById('rowCount').innerHTML = `Exibindo <span>${rows.length}</span> de <span>${DATA.length}</span> registros`;

  // Update header sort indicators
  document.querySelectorAll('thead th').forEach(th => {
    th.classList.remove('sorted-asc', 'sorted-desc');
    const arrow = th.querySelector('.sort-arrow');
    if (th.dataset.col === sortCol) {
      th.classList.add(sortAsc ? 'sorted-asc' : 'sorted-desc');
      arrow.innerHTML = sortAsc ? '&#9650;' : '&#9660;';
    } else {
      arrow.innerHTML = '&#9650;';
    }
  });
}

// Sort on header click
document.querySelectorAll('thead th').forEach(th => {
  th.addEventListener('click', () => {
    const col = th.dataset.col;
    if (sortCol === col) { sortAsc = !sortAsc; }
    else { sortCol = col; sortAsc = true; }
    render();
  });
});

// Filter events
[selRole, selQuestion, selCluster, selCS].forEach(el => el.addEventListener('change', render));
inputSearch.addEventListener('input', render);
document.getElementById('btnClear').addEventListener('click', () => {
  selRole.value = ''; selQuestion.value = ''; selCluster.value = ''; selCS.value = ''; inputSearch.value = '';
  render();
});

render();
</script>
